<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi PWA + Google Drive</title>
  <style>
    * { box-sizing: border-box; font-family: system-ui, sans-serif; }
    body { background: #0f0f0f; color: #fff; padding: 20px; max-width: 600px; margin: 0 auto; }
    button { background: #1a73e8; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-size: 16px; margin: 5px 0; width: 100%; cursor: pointer; }
    button:disabled { background: #444; }
    .status { padding: 10px; border-radius: 6px; margin: 10px 0; font-size: 14px; }
    .ok { background: #1e3a2e; color: #4ade80; }
    .err { background: #3a1e1e; color: #f87171; }
    .info { background: #1e2a3a; color: #60a5fa; }
    input, textarea { width: 100%; padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid #333; background: #1a1a1a; color: #fff; }
    .record { background: #1a1a1a; padding: 10px; margin: 5px 0; border-radius: 6px; border-left: 3px solid #1a73e8; }
    .hidden { display: none; }
    h1 { font-size: 22px; margin-bottom: 5px; }
    p { color: #888; font-size: 14px; margin-top: 0; }
  </style>
</head>
<body>

  <h1>📱 PWA + Google Drive</h1>
  <p>Tus registros se guardan localmente y se sincronizan con Drive</p>

  <div id="authSection">
    <button id="btnLogin">🔐 Iniciar sesión con Google</button>
    <div id="authStatus" class="status info">No autenticado</div>
  </div>

  <div id="appSection" class="hidden">
    <div id="userStatus" class="status ok"></div>

    <h3>📝 Nuevo registro</h3>
    <input type="text" id="inputTitle" placeholder="Título del registro">
    <textarea id="inputBody" placeholder="Contenido..." rows="3"></textarea>
    <button id="btnSave">💾 Guardar localmente</button>

    <h3>☁️ Sincronización</h3>
    <button id="btnSync">🔄 Sincronizar con Google Drive</button>
    <button id="btnBackup">📦 Backup completo</button>
    <button id="btnLoad">📂 Cargar desde Drive</button>
    <button id="btnLogout" style="background:#444;">Cerrar sesión</button>

    <div id="syncStatus" class="status info"></div>

    <h3>📋 Registros locales</h3>
    <div id="recordsList"></div>
  </div>

<script>
// ==================== CONFIGURACIÓN ====================
const CLIENT_ID = '947071105589-98uqulm4tn6mkbieknp7r04kh2v4f8eg.apps.googleusercontent.com';
const REDIRECT_URI = window.location.origin + window.location.pathname;
const SCOPE = 'https://www.googleapis.com/auth/drive.file';

// ==================== BASE DE DATOS LOCAL ====================
const DB = {
  db: null,
  async init() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open('PWA_Records', 1);
      req.onerror = () => reject(req.error);
      req.onsuccess = () => { this.db = req.result; resolve(); };
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('records')) {
          db.createObjectStore('records', { keyPath: 'id', autoIncrement: true });
        }
      };
    });
  },
  async add(record) {
    const tx = this.db.transaction('records', 'readwrite');
    const store = tx.objectStore('records');
    return store.add({ ...record, createdAt: Date.now() });
  },
  async getAll() {
    const tx = this.db.transaction('records', 'readonly');
    return tx.objectStore('records').getAll();
  },
  async clear() {
    const tx = this.db.transaction('records', 'readwrite');
    return tx.objectStore('records').clear();
  }
};

// ==================== GOOGLE DRIVE AUTH (PKCE) ====================
const Auth = {
  generateCodeVerifier() {
    const arr = new Uint8Array(64);
    crypto.getRandomValues(arr);
    return btoa(String.fromCharCode(...arr)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
  },
  async generateCodeChallenge(v) {
    const hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(v));
    return btoa(String.fromCharCode(...new Uint8Array(hash))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
  },
  async login() {
    const verifier = this.generateCodeVerifier();
    const challenge = await this.generateCodeChallenge(verifier);
    sessionStorage.setItem('pkce_verifier', verifier);

    const params = new URLSearchParams({
      client_id: CLIENT_ID,
      redirect_uri: REDIRECT_URI,
      response_type: 'code',
      scope: SCOPE,
      code_challenge: challenge,
      code_challenge_method: 'S256',
      access_type: 'offline',
      prompt: 'consent'
    });
    window.location.href = `https://accounts.google.com/o/oauth2/v2/auth?${params}`;
  },
  async handleCallback() {
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');
    const verifier = sessionStorage.getItem('pkce_verifier');
    if (!code || !verifier) return false;

    const res = await fetch('https://oauth2.googleapis.com/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        client_id: CLIENT_ID,
        code: code,
        code_verifier: verifier,
        redirect_uri: REDIRECT_URI,
        grant_type: 'authorization_code'
      })
    });

    const data = await res.json();
    if (data.access_token) {
      localStorage.setItem('gdrive_token', data.access_token);
      if (data.refresh_token) localStorage.setItem('gdrive_refresh', data.refresh_token);
      window.history.replaceState({}, document.title, REDIRECT_URI);
      return true;
    }
    return false;
  },
  getToken() { return localStorage.getItem('gdrive_token'); },
  isAuth() { return !!this.getToken(); },
  logout() {
    localStorage.removeItem('gdrive_token');
    localStorage.removeItem('gdrive_refresh');
    location.reload();
  }
};

// ==================== GOOGLE DRIVE CLIENT ====================
const Drive = {
  async request(url, options = {}) {
    const token = Auth.getToken();
    const res = await fetch(url, {
      ...options,
      headers: { ...options.headers, 'Authorization': `Bearer ${token}` }
    });
    if (res.status === 401) throw new Error('Token expirado. Vuelve a iniciar sesión.');
    return res;
  },
  async uploadJSON(filename, contentObj) {
    const metadata = { name: filename, mimeType: 'application/json' };
    const content = JSON.stringify(contentObj);
    const boundary = 'foo_bar_baz';
    const body = [
      `--${boundary}`, 'Content-Type: application/json; charset=UTF-8', '',
      JSON.stringify(metadata), `--${boundary}`, 'Content-Type: application/json', '',
      content, `--${boundary}--`
    ].join('
');

    const res = await this.request(
      'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name',
      {
        method: 'POST',
        headers: { 'Content-Type': `multipart/related; boundary=${boundary}` },
        body: body
      }
    );
    return res.json();
  },
  async listFiles(query = null) {
    const params = new URLSearchParams({ fields: 'files(id,name,modifiedTime)', pageSize: '10' });
    if (query) params.append('q', query);
    const res = await this.request(`https://www.googleapis.com/drive/v3/files?${params}`);
    return res.json();
  },
  async downloadFile(fileId) {
    const res = await this.request(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`);
    return res.json();
  }
};

// ==================== UI Y LÓGICA ====================
const UI = {
  init() {
    document.getElementById('btnLogin').onclick = () => Auth.login();
    document.getElementById('btnLogout').onclick = () => Auth.logout();
    document.getElementById('btnSave').onclick = () => this.saveLocal();
    document.getElementById('btnSync').onclick = () => this.syncToDrive();
    document.getElementById('btnBackup').onclick = () => this.fullBackup();
    document.getElementById('btnLoad').onclick = () => this.loadFromDrive();
    this.checkAuth();
    this.renderRecords();
  },
  checkAuth() {
    if (Auth.isAuth()) {
      document.getElementById('authSection').classList.add('hidden');
      document.getElementById('appSection').classList.remove('hidden');
      document.getElementById('userStatus').textContent = '✅ Sesión activa con Google Drive';
    }
  },
  async saveLocal() {
    const title = document.getElementById('inputTitle').value.trim();
    const body = document.getElementById('inputBody').value.trim();
    if (!title) return alert('Escribe un título');
    await DB.add({ title, body });
    document.getElementById('inputTitle').value = '';
    document.getElementById('inputBody').value = '';
    this.renderRecords();
    this.showSync('💾 Guardado localmente');
  },
  async renderRecords() {
    const records = await DB.getAll();
    const container = document.getElementById('recordsList');
    if (!records.length) {
      container.innerHTML = '<div class="status info">No hay registros locales</div>';
      return;
    }
    container.innerHTML = records.map(r => `
      <div class="record">
        <strong>${r.title}</strong><br>
        <small style="color:#888">${new Date(r.createdAt).toLocaleString()}</small><br>
        ${r.body}
      </div>
    `).join('');
  },
  async syncToDrive() {
    const records = await DB.getAll();
    if (!records.length) return this.showSync('No hay registros para sincronizar', true);
    try {
      const result = await Drive.uploadJSON(`sync_${Date.now()}.json`, {
        app: 'Mi PWA', exportedAt: Date.now(), records: records
      });
      this.showSync(`✅ Sincronizado: ${result.name}`);
    } catch (e) {
      this.showSync(`❌ Error: ${e.message}`, true);
    }
  },
  async fullBackup() {
    const records = await DB.getAll();
    try {
      const result = await Drive.uploadJSON(`backup_${new Date().toISOString().split('T')[0]}.json`, {
        type: 'full-backup', total: records.length, records: records
      });
      this.showSync(`📦 Backup guardado: ${result.name}`);
    } catch (e) {
      this.showSync(`❌ Error: ${e.message}`, true);
    }
  },
  async loadFromDrive() {
    try {
      const list = await Drive.listFiles("name contains 'backup_' or name contains 'sync_'");
      if (!list.files || !list.files.length) return this.showSync('No hay archivos en Drive', true);
      const latest = list.files.sort((a, b) => new Date(b.modifiedTime) - new Date(a.modifiedTime))[0];
      const data = await Drive.downloadFile(latest.id);
      if (data.records && confirm(`¿Restaurar ${data.records.length} registros desde "${latest.name}"?`)) {
        await DB.clear();
        for (const r of data.records) await DB.add({ title: r.title, body: r.body, createdAt: r.createdAt });
        this.renderRecords();
        this.showSync(`📂 Restaurado desde Drive`);
      }
    } catch (e) {
      this.showSync(`❌ Error: ${e.message}`, true);
    }
  },
  showSync(msg, isError = false) {
    const el = document.getElementById('syncStatus');
    el.textContent = msg;
    el.className = `status ${isError ? 'err' : 'ok'}`;
  }
};

// ==================== INICIO ====================
(async function() {
  await DB.init();
  if (window.location.search.includes('code=')) {
    const ok = await Auth.handleCallback();
    if (ok) {
      document.getElementById('authStatus').textContent = '✅ Autenticado. Cargando...';
      document.getElementById('authStatus').className = 'status ok';
      setTimeout(() => UI.init(), 500);
    } else {
      document.getElementById('authStatus').textContent = '❌ Error al autenticar';
      document.getElementById('authStatus').className = 'status err';
    }
  } else {
    UI.init();
  }
})();
</script>

</body>
</html>
